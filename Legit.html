<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Legit</title>
    <style>
      body {
        font-family: Courier New;
        width: 200px;
        height: 100px;
        display: flex;
        flex-direction: column;
        align-items: center;      /* centers horizontally */
        text-align: center;
        margin: 0;
        border-radius: 50%;
      }

      button {
        background-color: rgb(92, 243, 92);
        color: rgb(37, 37, 37);
        border: none;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-family: Courier New;
        font-size: small;
        transition: transform 0.3s ease;
        font-weight: bold;
      }

      button:hover {
        background-color: #00bc03;
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <h2>Legit</h2>
    <button id="ActivateBtn">Test legitamcy now</button>

    <script src="./scripts/popup.js"></script>
  </body>
</html>
